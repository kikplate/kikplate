# Default values for kikplate.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

namespace: ""

# ---------------------------------------------------------------------------
# API (backend)
# ---------------------------------------------------------------------------
api:
  replicaCount: 1
  image:
    repository: ghcr.io/moeidheidari/kikplate-api
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20

# ---------------------------------------------------------------------------
# Sync worker (runs app:sync command)
# ---------------------------------------------------------------------------
sync:
  replicaCount: 1
  image:
    repository: ghcr.io/moeidheidari/kikplate-api
    tag: main
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Web (Next.js frontend)
# ---------------------------------------------------------------------------
web:
  replicaCount: 1
  image:
    repository: ghcr.io/moeidheidari/kikplate-web
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  persistence:
    size: 10Gi
    accessMode: ReadWriteOnce

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: kikplate.example.com
  annotations:
    {}

# ---------------------------------------------------------------------------
# App secrets  (override these – never commit real values)
# ---------------------------------------------------------------------------
secrets:
  jwtSecret: "change-me-jwt-secret"
  sso:
    githubClientSecret: ""
    googleClientSecret: ""
    gitlabClientSecret: ""

# ---------------------------------------------------------------------------
# PostgreSQL credentials
# ---------------------------------------------------------------------------
postgresql:
  database: kikplate
  username: postgres
  password: password

# ---------------------------------------------------------------------------
# Application config  (rendered into app-config ConfigMap)
# ---------------------------------------------------------------------------
config:
  server:
    port: 3001
    frontendUrl: "http://localhost:3000"
    log:
      level: info
  sync:
    interval: 20m
    pollInterval: 5m
    batchSize: 25
  sso:
    providers:
      - name: github
        clientId: "Ov23lid5LSBSn2mplIvf"
        redirectUrl: "http://localhost:3000/api/auth/github/callback"
        scopes:
          - read:user
          - user:email
      - name: google
        clientId: "your_google_client_id"
        redirectUrl: "http://localhost:3000/api/auth/google/callback"
        scopes:
          - openid
          - email
          - profile
      - name: gitlab
        clientId: "your_gitlab_client_id"
        redirectUrl: "http://localhost:3000/api/auth/gitlab/callback"
        scopes:
          - openid
          - email
          - profile
  customization:
    logo: /kikplate-logo-on-dark.svg
    bannerTitle: "The Home of your starter boilerplates"
    badgeRequestUrl: "https://github.com/MoeidHeidari/kikplate/issues/new?template=badge-request.yml"
    socialMedia:
      - type: github
        link: "https://github.com/kickplate"
      - type: slack
        link: "https://your-workspace.slack.com"
      - type: linkedin
        link: "https://www.linkedin.com/company/your-company"
      - type: x
        link: "https://x.com/your-handle"
    preparedQueries:
      - "Golang starter"
      - "Clean architecture boilerplate for Nodejs"
      - "Go Chi REST"
      - "Python http server"
      - "Next.js"
      - "Gin framework"
      - "Postgresql docker-compose"
      - "Nginx"
  badges:
    - slug: official
      name: Official
      description: Officially recognized and maintained by the project owners
      icon: award
      tier: official
    - slug: production-ready
      name: Production Ready
      description: Ready for production environments with high reliability
      icon: rocket
      tier: official
    - slug: security-friendly
      name: Security Friendly
      description: Follows security best practices and has strong security measures
      icon: shield-check
      tier: official
    - slug: clean
      name: Clean
      description: Clean and well-organized codebase
      icon: sparkles
      tier: community
    - slug: clean-code
      name: Clean Code
      description: Follows clean code principles and best practices
      icon: code
      tier: community
    - slug: documented
      name: Documented
      description: Well-documented with clear and comprehensive documentation
      icon: book-open
      tier: community
    - slug: well-tested
      name: Well Tested
      description: Comes with comprehensive unit, integration, and end-to-end tests
      icon: flask-conical
      tier: community
    - slug: docker-ready
      name: Docker Ready
      description: Fully containerized and easy to run with Docker
      icon: container
      tier: community
    - slug: cloud-native
      name: Cloud Native
      description: Designed for cloud-native environments and orchestration
      icon: cloud
      tier: community
    - slug: microservice
      name: Microservice
      description: Built using microservices architecture
      icon: layers
      tier: community
