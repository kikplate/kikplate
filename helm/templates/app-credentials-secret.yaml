apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: {{ include "kikplate.namespace" . }}
  labels:
    {{- include "kikplate.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  SSO_GITHUB_CLIENT_SECRET: {{ .Values.secrets.sso.githubClientSecret | quote }}
  SSO_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.sso.googleClientSecret | quote }}
  SSO_GITLAB_CLIENT_SECRET: {{ .Values.secrets.sso.gitlabClientSecret | quote }}
