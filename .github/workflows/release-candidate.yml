name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build RC from
        required: true
        default: pre-release
        type: string
      push_images:
        description: Push RC images to GHCR
        required: true
        default: true
        type: boolean
      rc_tag:
        description: Optional RC tag override (for image tags)
        required: false
        type: string
      changelog:
        description: Optional inline markdown notes for GitHub prerelease
        required: false
        type: string
      changelog_file:
        description: Optional markdown file path in repo (recommended for long notes)
        required: false
        default: .github/rc-notes.md
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: rc-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  resolve-ref:
    name: Resolve Build Ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.out.outputs.ref }}
      push_images: ${{ steps.out.outputs.push_images }}
    steps:
      - name: Resolve ref and push behavior
        id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.ref }}" >> "${GITHUB_OUTPUT}"
            echo "push_images=${{ inputs.push_images }}" >> "${GITHUB_OUTPUT}"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "push_images=true" >> "${GITHUB_OUTPUT}"
          fi

  api-quality:
    name: API Quality
    runs-on: ubuntu-latest
    needs: resolve-ref
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...

  web-quality:
    name: Web Quality
    runs-on: ubuntu-latest
    needs: resolve-ref
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run production build
        run: npm run build

  build-rc-images:
    name: Build RC Images
    runs-on: ubuntu-latest
    needs:
      - resolve-ref
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Prepare RC tags
        id: prep
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          sha_short=$(git rev-parse --short=7 HEAD)
          ref_slug=$(echo "${{ needs.resolve-ref.outputs.ref }}" | tr '/:@' '-' | tr '[:upper:]' '[:lower:]')
          ts=$(date +%Y%m%d%H%M)
          rc_tag="${{ inputs.rc_tag }}"

          if [ -z "$rc_tag" ]; then
            rc_tag="rc-${ref_slug}-${ts}-${sha_short}"
          fi

          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "rc_tag=${rc_tag}" >> "${GITHUB_OUTPUT}"

      - name: Prepare prerelease notes file
        run: |
          if [ -n "${{ inputs.changelog }}" ]; then
            cat <<'EOF' > RC_NOTES.md
            ${{ inputs.changelog }}
            EOF
          elif [ -f "${{ inputs.changelog_file }}" ]; then
            cp "${{ inputs.changelog_file }}" RC_NOTES.md
          else
            cat <<'EOF' > RC_NOTES.md
            ## Release Candidate

            - Ref: ${{ needs.resolve-ref.outputs.ref }}
            - Image tag: ${{ steps.prep.outputs.rc_tag }}
            - API image: ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:${{ steps.prep.outputs.rc_tag }}
            - Web image: ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:${{ steps.prep.outputs.rc_tag }}
            EOF
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.resolve-ref.outputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API RC image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.resolve-ref.outputs.push_images == 'true' }}
          cache-from: type=gha,scope=api-rc
          cache-to: type=gha,mode=max,scope=api-rc
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:${{ steps.prep.outputs.rc_tag }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:pre-release-latest

      - name: Build and push web RC image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.resolve-ref.outputs.push_images == 'true' }}
          cache-from: type=gha,scope=web-rc
          cache-to: type=gha,mode=max,scope=web-rc
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:${{ steps.prep.outputs.rc_tag }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:pre-release-latest

      - name: Create git RC tag
        run: |
          if git rev-parse "${{ steps.prep.outputs.rc_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.prep.outputs.rc_tag }} already exists" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.prep.outputs.rc_tag }}"
          git push origin "${{ steps.prep.outputs.rc_tag }}"

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.rc_tag }}
          name: ${{ steps.prep.outputs.rc_tag }}
          body_path: RC_NOTES.md
          prerelease: true
          generate_release_notes: false
