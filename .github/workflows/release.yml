name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump type
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: Optional inline markdown notes (short text field in UI)
        required: false
        type: string
      changelog_file:
        description: Optional markdown file path in repo (recommended for long notes)
        required: false
        default: .github/release-notes.md
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  validate-main:
    name: Validate Main Branch
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Release workflow must be run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  api-quality:
    name: API Quality
    runs-on: ubuntu-latest
    needs: validate-main
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...

  web-quality:
    name: Web Quality
    runs-on: ubuntu-latest
    needs: validate-main
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run production build
        run: npm run build

  release:
    name: Build, Tag And Release
    runs-on: ubuntu-latest
    needs:
      - api-quality
      - web-quality
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          latest_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag $next_tag already exists" >&2
            exit 1
          fi

          echo "version=${next_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${next_tag}" >> "${GITHUB_OUTPUT}"

      - name: Prepare release notes file
        run: |
          if [ -n "${{ inputs.changelog }}" ]; then
            cat <<'EOF' > RELEASE_NOTES.md
            ${{ inputs.changelog }}
            EOF
          elif [ -f "${{ inputs.changelog_file }}" ]; then
            cp "${{ inputs.changelog_file }}" RELEASE_NOTES.md
          else
            cat <<'EOF' > RELEASE_NOTES.md
            ## Release Notes

            - No custom changelog was provided.
            - See commit history and generated notes for details.
            EOF
          fi

      - name: Prepare image names
        id: prep
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          major=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)
          major_minor=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1,2)
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major_minor}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API release image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=api-release
          cache-to: type=gha,mode=max,scope=api-release
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:${{ steps.prep.outputs.major_minor }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:${{ steps.prep.outputs.major }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:latest

      - name: Build and push web release image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=web-release
          cache-to: type=gha,mode=max,scope=web-release
          build-args: |
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:${{ steps.prep.outputs.major_minor }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:${{ steps.prep.outputs.major }}
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:latest

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
