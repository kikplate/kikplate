name: Sync docs to wiki

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/sync-docs-to-wiki.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Sync markdown docs to wiki
        run: |
          rsync -av --delete \
            --include="*/" \
            --include="*.md" \
            --exclude="*" \
            docs/ wiki/

          # Force wiki landing page to come from docs/Home.md
          if [ -f docs/Home.md ]; then
            cp docs/Home.md wiki/Home.md
          fi

      - name: Commit and push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
            exit 0
          fi
          git commit -m "docs: sync from main repository docs"
          git push
