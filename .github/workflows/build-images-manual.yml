name: Manual Image Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build from
        required: true
        default: main
        type: string
      push_images:
        description: Push images to GHCR
        required: true
        default: false
        type: boolean
      image_tag:
        description: Optional image tag override
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: manual-build-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  api-quality:
    name: API Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...

  web-quality:
    name: Web Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run production build
        run: npm run build

  build-images:
    name: Build Manual Images
    runs-on: ubuntu-latest
    needs:
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare image names
        id: prep
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          sha_short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          ref_slug=$(echo "${{ inputs.ref }}" | tr '/:@' '-' | tr '[:upper:]' '[:lower:]')
          tag="${{ inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="manual-${ref_slug}-${sha_short}"
          fi
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push_images
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          cache-from: type=gha,scope=api-manual
          cache-to: type=gha,mode=max,scope=api-manual
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:${{ steps.prep.outputs.tag }}

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images }}
          cache-from: type=gha,scope=web-manual
          cache-to: type=gha,mode=max,scope=web-manual
          build-args: |
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:${{ steps.prep.outputs.tag }}
