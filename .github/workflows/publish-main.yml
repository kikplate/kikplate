name: Publish Main Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-main
  cancel-in-progress: true

jobs:
  api-quality:
    name: API Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...

  web-quality:
    name: Web Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run production build
        run: npm run build

  publish-images:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs:
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: prep
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          sha_short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "sha_short=${sha_short}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=api-main
          cache-to: type=gha,mode=max,scope=api-main
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:main
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:sha-${{ steps.prep.outputs.sha_short }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=web-main
          cache-to: type=gha,mode=max,scope=web-main
          build-args: |
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:main
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:sha-${{ steps.prep.outputs.sha_short }}
